apiVesrion: v1
kind: PersistentVolume
metadata:
  name: bookstack-local-pv
  labels:
    type: local
    app: bookstack
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/data/bookstack
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernates.io/hostname #we need change this
          operator: In
          values:
          - hostname #we need change this