apiVersion: v1
kind: PersistentVolume
metadata:
  name: mariadb-local-pv
  labels:
    type: local
    app: mariadb
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  storageClassName: local-storage
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /mnt/data/mariadb
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernates.io/hostname
          operator: In
          values:
          - hostname
