apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookstack-ingress
  namespace: bookstack
spec:
  ingressClassName: nginx
  rules:
  - host: bookstack.local       #hostname
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bookstack-service
            port:
              number: 80
