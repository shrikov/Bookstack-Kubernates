apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: bookstack
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: linuxserver/mariadb:latest
        ports:
        - containerPort: 3306
        env:
        - name: REMOTE_MANAGEMENT
          value: "true"
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bookstack-secrets
              key: DB_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: bookstack-secrets
              key: DB_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: bookstack-secrets
              key: DB_USERNAME
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bookstack-secrets
              key: DB_PASSWORD
        - name: PGID
          value: "911"
        - name: PUID
          value: "911"
        volumeMounts:
        - name: mariadb-storage
          mountPath: /config
      volumes:
      - name: mariadb-storage
        persistentVolumeClaim:
          claimName: mariadb-data
